name: Release Android

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install JS deps
        run: npm ci

      - name: Init Android project (CI)
        run: npm run tauri android init -- --ci

      - name: Build Android app (release)
        run: npm run tauri android build -- --ci

      - name: Collect Android artifacts
        run: |
          mkdir -p android-release
          find src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} android-release/ \;
          ls -lah android-release
          test -n "$(ls -A android-release)"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-release/*.apk
            android-release/*.aab
