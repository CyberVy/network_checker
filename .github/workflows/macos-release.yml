name: Release macOS

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install JS deps
        run: npm ci

      - name: Build Tauri app (universal)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Package DMG bundle (universal)
        run: zip -r macos-arm64-and-x86-dmg.zip src-tauri/target/universal-apple-darwin/release/bundle/dmg

      - name: Build Tauri app (aarch64-apple-darwin)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Package DMG bundle (aarch64-apple-darwin)
        run: zip -r macos-arm64-dmg.zip src-tauri/target/aarch64-apple-darwin/release/bundle/dmg

      - name: Package frontend (Next.js out)
        run: zip -r frontend-macos-arm64.zip out

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-arm64-and-x86-dmg.zip
            macos-arm64-dmg.zip
            frontend-macos-arm64.zip
